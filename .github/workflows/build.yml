name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  go-sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Validate shared contracts (if available)
        run: |
          if [ -f shared-contracts/validate_contracts.py ]; then
            python3 shared-contracts/validate_contracts.py
          elif [ -f ../shared-contracts/validate_contracts.py ]; then
            python3 ../shared-contracts/validate_contracts.py
          else
            echo "shared-contracts validator not present in this repository checkout"
          fi
      - uses: actions/setup-go@v6
        with:
          go-version-file: go-sidecar/go.mod
          cache-dependency-path: go-sidecar/go.sum
      - name: Run release compliance checks
        run: |
          chmod +x .github/scripts/release_compliance_check.sh
          ./.github/scripts/release_compliance_check.sh
      - name: Download Go dependencies
        working-directory: go-sidecar
        run: |
          go mod tidy
          go mod download
      - name: Commit resolved Go lockfile
        if: github.event_name != 'pull_request'
        run: |
          if ! git diff --quiet -- go-sidecar/go.sum go-sidecar/go.mod; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add go-sidecar/go.sum go-sidecar/go.mod
            git commit -m "chore: update Go sidecar dependency lockfile"
            git push
          fi
      - name: Upload resolved Go module files
        uses: actions/upload-artifact@v7
        with:
          name: maybeedgescanner-go-sum
          path: |
            go-sidecar/go.mod
            go-sidecar/go.sum
      - name: Test Go sidecar
        working-directory: go-sidecar
        run: go test ./...
      - name: Vet Go sidecar
        working-directory: go-sidecar
        run: go vet ./...
      - name: Race-test Go sidecar
        working-directory: go-sidecar
        run: go test -race ./...
      - name: Build Linux sidecar
        working-directory: go-sidecar
        run: go build -trimpath -ldflags="-s -w" -o maybeedgescanner-sidecar-linux-amd64 .
      - name: Build Windows sidecar
        working-directory: go-sidecar
        run: GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o maybeedgescanner-sidecar-windows-amd64.exe .
      - name: Build macOS sidecar
        working-directory: go-sidecar
        run: GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o maybeedgescanner-sidecar-darwin-amd64 .
      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@v7
        with:
          name: maybeedgescanner-sidecars
          path: |
            go-sidecar/maybeedgescanner-sidecar-linux-amd64
            go-sidecar/maybeedgescanner-sidecar-windows-amd64.exe
            go-sidecar/maybeedgescanner-sidecar-darwin-amd64

  android:
    runs-on: ubuntu-latest
    needs: go-sidecar
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14.2"
      - name: Validate release signing secrets
        if: github.event_name != 'pull_request'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          missing=0
          for name in RELEASE_KEYSTORE_BASE64 RELEASE_KEYSTORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub Actions secret::$name is not available to this workflow. Add it under repository Settings > Secrets and variables > Actions."
              missing=1
            fi
          done
          exit "$missing"
      - name: Configure release signing
        if: github.event_name != 'pull_request'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          mkdir -p .signing
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > .signing/release.p12
          {
            echo "STORE_FILE=.signing/release.p12"
            echo "STORE_PASSWORD=$RELEASE_KEYSTORE_PASSWORD"
            echo "KEY_ALIAS=$RELEASE_KEY_ALIAS"
            echo "KEY_PASSWORD=$RELEASE_KEY_PASSWORD"
          } > signing.properties
      - name: Download Gradle dependencies
        run: gradle --no-daemon --refresh-dependencies :app:dependencies
      - name: Lint Android app
        run: gradle --no-daemon :app:lintUniversalDebug
      - name: Run Android unit tests
        run: gradle --no-daemon :app:testUniversalDebugUnitTest
      - name: Build debug APK
        if: github.event_name == 'pull_request'
        run: gradle --no-daemon :app:assembleDebug
      - name: Build signed Android APKs
        if: github.event_name != 'pull_request'
        run: gradle --no-daemon :app:assembleDebug :app:assembleRelease
      - name: Verify release APK signing
        if: github.event_name != 'pull_request'
        run: |
          mapfile -t APKS < <(find app/build/outputs/apk -path '*/release/*.apk' | sort)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "No release APKs found" >&2
            exit 1
          fi
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/apksigner"
          for APK in "${APKS[@]}"; do
            echo "Verifying $APK"
            "$APKSIGNER" verify --verbose --print-certs "$APK"
          done
      - name: Upload APK artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: maybeedgescanner-apks
          path: app/build/outputs/apk/**/release/*.apk

  benchmarks:
    name: Sidecar benchmarks
    runs-on: ubuntu-latest
    needs: go-sidecar
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go-sidecar/go.mod
          cache-dependency-path: go-sidecar/go.sum
      - name: Run Go benchmark suite
        working-directory: go-sidecar
        run: |
          mkdir -p ../dist/benchmarks
          go test -bench . -benchmem ./... | tee ../dist/benchmarks/maybeedgescanner-go-bench.txt
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: maybeedgescanner-benchmarks
          path: dist/benchmarks/*.txt

  dependency-container:
    name: Publish dependency container
    runs-on: ubuntu-latest
    needs:
      - go-sidecar
      - android
      - benchmarks
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Download resolved Go module files
        uses: actions/download-artifact@v7
        with:
          name: maybeedgescanner-go-sum
          path: go-sidecar
      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - uses: docker/setup-buildx-action@v4
      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-deps" >> "$GITHUB_OUTPUT"
      - name: Check whether dependency image needs refresh
        id: deps
        run: |
          IMAGE="${{ steps.image.outputs.name }}"
          CHANGED="false"
          REASON="dependency inputs unchanged"
          if ! docker buildx imagetools inspect "$IMAGE:latest" >/dev/null 2>&1; then
            CHANGED="true"
            REASON="dependency image does not exist yet"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED="true"
            REASON="manual workflow dispatch"
          elif ! git diff --quiet -- go-sidecar/go.mod go-sidecar/go.sum; then
            CHANGED="true"
            REASON="resolved Go module files changed"
          else
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="$(git rev-list --max-parents=0 HEAD)"
            fi
            if ! git diff --quiet "$BASE" HEAD -- \
              go-sidecar/go.mod go-sidecar/go.sum \
              settings.gradle build.gradle gradle.properties app/build.gradle \
              .github/dependency-container/Dockerfile; then
              CHANGED="true"
              REASON="dependency inputs changed"
            fi
          fi
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
      - name: Build and push warmed dependency image
        if: steps.deps.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/dependency-container/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.title=MaybeEdgeScanner dependency cache
            org.opencontainers.image.description=Android Gradle and Go module dependencies warmed for MaybeEdgeScanner CI builds
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          annotations: |
            org.opencontainers.image.description=Android Gradle and Go module dependencies warmed for MaybeEdgeScanner CI builds
          provenance: true
          sbom: true
          cache-from: |
            type=gha,scope=maybeedgescanner-deps
            type=registry,ref=${{ steps.image.outputs.name }}:buildcache
          cache-to: |
            type=gha,scope=maybeedgescanner-deps,mode=max
            type=registry,ref=${{ steps.image.outputs.name }}:buildcache,mode=max
      - name: Summarize dependency image
        run: |
          IMAGE="${{ steps.image.outputs.name }}"
          if [ "${{ steps.deps.outputs.changed }}" = "true" ]; then
            echo "Published $IMAGE:${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"
            echo "Published $IMAGE:latest" >> "$GITHUB_STEP_SUMMARY"
            echo "Refresh reason: ${{ steps.deps.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Skipped dependency image refresh for $IMAGE:latest" >> "$GITHUB_STEP_SUMMARY"
            echo "Reason: ${{ steps.deps.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          fi

  release:
    name: Release app
    runs-on: ubuntu-latest
    needs:
      - go-sidecar
      - android
      - benchmarks
      - dependency-container
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go-sidecar/go.mod
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14.2"
      - name: Download APK artifacts
        uses: actions/download-artifact@v7
        with:
          name: maybeedgescanner-apks
          path: dist/apks
      - name: Download sidecar artifacts
        uses: actions/download-artifact@v7
        with:
          name: maybeedgescanner-sidecars
          path: dist/sidecars
      - name: Download benchmark artifacts
        uses: actions/download-artifact@v7
        with:
          name: maybeedgescanner-benchmarks
          path: dist/benchmarks
      - name: Build source archive and compliance inventories
        run: |
          mkdir -p dist/source dist/compliance/licenses
          git archive --format=tar.gz --output="dist/source/MaybeEdgeScanner-source-${GITHUB_SHA}.tar.gz" "$GITHUB_SHA"
          git archive --format=zip --output="dist/source/MaybeEdgeScanner-source-${GITHUB_SHA}.zip" "$GITHUB_SHA"
          (
            cd go-sidecar
            go list -m all
          ) > dist/compliance/licenses/go-modules.txt
          gradle --no-daemon :app:dependencies > dist/compliance/licenses/android-dependencies.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t ASSETS < <(find dist -type f | sort)
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No release assets found under dist" >&2
            exit 1
          fi
          APP_VERSION_DEFAULT="$(awk -F= '/^APP_VERSION_NAME=/{print $2}' gradle.properties | tail -n1 | tr -d '\r')"
          BASE_VERSION_CODE="$(awk -F= '/^APP_BASE_VERSION_CODE=/{print $2}' gradle.properties | tail -n1 | tr -d '\r')"
          if [ -z "$APP_VERSION_DEFAULT" ] || [ -z "$BASE_VERSION_CODE" ]; then
            echo "Missing APP_VERSION_NAME or APP_BASE_VERSION_CODE in gradle.properties" >&2
            exit 1
          fi
          APP_VERSION="${ANDROID_VERSION_NAME:-$APP_VERSION_DEFAULT}"
          APP_VERSION_CODE="${ANDROID_VERSION_CODE:-$((BASE_VERSION_CODE + GITHUB_RUN_NUMBER))}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TIMESTAMP_STAMP="$(date +'%Y%m%d%H%M%S')"
          TAG_NAME="v${APP_VERSION}-${APP_VERSION_CODE}-${GITHUB_RUN_NUMBER}-${SHORT_SHA}-${TIMESTAMP_STAMP}"
          gh release create "$TAG_NAME" "${ASSETS[@]}" \
            --target "$GITHUB_SHA" \
            --title "MaybeEdgeScanner ${APP_VERSION} (${APP_VERSION_CODE})" \
            --notes "Automated release from workflow run ${{ github.run_id }} for commit $GITHUB_SHA." \
            --latest
