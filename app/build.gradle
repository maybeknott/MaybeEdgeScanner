plugins {
    id 'com.android.application'
}

def signingPropsFile = rootProject.file('signing.properties')
def signingProps = new Properties()
def hasReleaseSigning = signingPropsFile.canRead()
if (hasReleaseSigning) {
    signingPropsFile.withInputStream { signingProps.load(it) }
}
def releaseSigningFromEnv = System.getenv('RELEASE_STORE_FILE') &&
    System.getenv('RELEASE_STORE_PASSWORD') &&
    System.getenv('RELEASE_KEY_ALIAS') &&
    System.getenv('RELEASE_KEY_PASSWORD')
def hasAnyReleaseSigning = hasReleaseSigning || releaseSigningFromEnv
def explicitBaseVersionCode = findProperty('APP_BASE_VERSION_CODE')
def explicitVersionName = findProperty('APP_VERSION_NAME')
def versionPropsExplicit = explicitBaseVersionCode && explicitVersionName
def baseVersionCode = (explicitBaseVersionCode ?: '20260528').toInteger()
def defaultVersionName = (explicitVersionName ?: '1.2.0').toString()
def ciRunNumber = System.getenv('GITHUB_RUN_NUMBER')
def resolvedVersionCode = (System.getenv('ANDROID_VERSION_CODE') ?: (ciRunNumber ? "${baseVersionCode + ciRunNumber.toInteger()}" : "${baseVersionCode}")).toInteger()
def resolvedVersionName = System.getenv('ANDROID_VERSION_NAME') ?: defaultVersionName

android {
    namespace 'com.maybeedgescanner'
    compileSdk 35

    defaultConfig {
        applicationId 'com.maybeknott.maybeedgescanner'
        minSdk 24
        targetSdk 35
        versionCode resolvedVersionCode
        versionName resolvedVersionName
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
    }

    flavorDimensions 'artifactAbi'
    productFlavors {
        universal {
            dimension 'artifactAbi'
        }
        armv7 {
            dimension 'artifactAbi'
            ndk {
                abiFilters 'armeabi-v7a'
            }
        }
        armv8 {
            dimension 'artifactAbi'
            ndk {
                abiFilters 'arm64-v8a'
            }
        }
    }

    signingConfigs {
        release {
            enableV1Signing true
            enableV2Signing true
            enableV3Signing true
            enableV4Signing false
            if (hasReleaseSigning) {
                storeFile rootProject.file(signingProps['STORE_FILE'])
                storePassword signingProps['STORE_PASSWORD']
                keyAlias signingProps['KEY_ALIAS']
                keyPassword signingProps['KEY_PASSWORD']
            } else if (releaseSigningFromEnv) {
                storeFile rootProject.file(System.getenv('RELEASE_STORE_FILE'))
                storePassword System.getenv('RELEASE_STORE_PASSWORD')
                keyAlias System.getenv('RELEASE_KEY_ALIAS')
                keyPassword System.getenv('RELEASE_KEY_PASSWORD')
            }
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix '.debug'
            versionNameSuffix '-debug'
        }
        release {
            minifyEnabled false
            if (hasAnyReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }

    applicationVariants.configureEach { variant ->
        variant.outputs.configureEach { output ->
            def abiName = variant.flavorName ?: 'universal'
            def safeVersionName = resolvedVersionName.replaceAll(/[^A-Za-z0-9._-]/, '_')
            output.outputFileName = "MaybeEdgeScanner-${abiName}-${variant.buildType.name}-v${safeVersionName}-${resolvedVersionCode}.apk"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    buildFeatures {
        aidl true
    }
}

gradle.taskGraph.whenReady { taskGraph ->
    def releaseRequested = taskGraph.allTasks.any { it.name.toLowerCase().contains('release') }
    if (releaseRequested && !versionPropsExplicit) {
        throw new GradleException('Release version must be manually updated and committed in gradle.properties before building a release.')
    }
    if (releaseRequested && !(resolvedVersionName ==~ /\d+\.\d+\.\d+([.-][A-Za-z0-9]+)?/)) {
        throw new GradleException('Release version must be an explicit semantic version in gradle.properties, for example 1.2.0.')
    }
    if (releaseRequested && !hasAnyReleaseSigning) {
        throw new GradleException('Release signing is required. Provide signing.properties or RELEASE_* environment variables.')
    }
}

dependencies {
    def shizukuVersion = '13.1.5'
    implementation "dev.rikka.shizuku:api:${shizukuVersion}"
    implementation "dev.rikka.shizuku:provider:${shizukuVersion}"
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test:core:1.6.1'
    androidTestImplementation 'androidx.test:runner:1.7.0'
}

def sidecarGoDir = file("${rootDir}/go-sidecar")
def sidecarAssetsRoot = file('src/main/assets/sidecar')
def sidecarBinaryName = 'maybeedgescanner-sidecar'

def resolveNdkClang(String triple, int apiLevel) {
    def sdkRoot = System.getenv('ANDROID_HOME') ?: System.getenv('ANDROID_SDK_ROOT')
    if (sdkRoot == null) {
        def localProps = new Properties()
        def localFile = rootProject.file('local.properties')
        if (localFile.canRead()) {
            localProps.load(localFile.newDataInputStream())
            sdkRoot = localProps.getProperty('sdk.dir')
        }
    }
    if (sdkRoot == null) return null
    def ndkRoot = System.getenv('ANDROID_NDK_HOME') ?: System.getenv('ANDROID_NDK_ROOT')
    if (ndkRoot == null) {
        def ndkDir = new File(sdkRoot, 'ndk')
        if (ndkDir.isDirectory()) {
            def versions = ndkDir.listFiles()?.findAll { it.isDirectory() }?.sort { a, b -> b.name <=> a.name }
            ndkRoot = versions ? versions[0].absolutePath : null
        }
    }
    if (ndkRoot == null) return null
    def hostTag = System.getProperty('os.name').toLowerCase(Locale.US).contains('windows') ? 'windows-x86_64'
            : (System.getProperty('os.name').toLowerCase(Locale.US).contains('mac') ? 'darwin-x86_64' : 'linux-x86_64')
    def candidate = new File(ndkRoot, "toolchains/llvm/prebuilt/${hostTag}/bin/${triple}${apiLevel}-clang")
    if (System.getProperty('os.name').toLowerCase(Locale.US).contains('windows')) {
        candidate = new File(candidate.parentFile, candidate.name + '.cmd')
    }
    return candidate.exists() ? candidate.absolutePath : null
}

tasks.register('packageSidecarBinaries') {
    group = 'build'
    description = 'Cross-compile Go sidecar for Android ABIs into src/main/assets/sidecar/. Set PACKAGE_SIDECAR=true to run before preBuild.'
    onlyIf {
        System.getenv('SKIP_SIDECAR_PACKAGE') != 'true'
    }
    doLast {
        if (!sidecarGoDir.isDirectory()) {
            throw new GradleException("Sidecar module not found: ${sidecarGoDir}")
        }
        def arm64Out = new File(sidecarAssetsRoot, "arm64-v8a/${sidecarBinaryName}")
        arm64Out.parentFile.mkdirs()
        exec {
            workingDir sidecarGoDir
            environment 'CGO_ENABLED', '0'
            environment 'GOOS', 'android'
            environment 'GOARCH', 'arm64'
            commandLine 'go', 'build', '-trimpath', '-ldflags=-s -w', '-o', arm64Out.absolutePath, '.'
        }
        def armCc = resolveNdkClang('armv7a-linux-androideabi', 21)
        if (armCc != null) {
            def armOut = new File(sidecarAssetsRoot, "armeabi-v7a/${sidecarBinaryName}")
            armOut.parentFile.mkdirs()
            exec {
                workingDir sidecarGoDir
                environment 'CGO_ENABLED', '1'
                environment 'GOOS', 'android'
                environment 'GOARCH', 'arm'
                environment 'CC', armCc
                commandLine 'go', 'build', '-trimpath', '-ldflags=-s -w', '-o', armOut.absolutePath, '.'
            }
        } else {
            logger.lifecycle('packageSidecarBinaries: skipped armeabi-v7a (NDK clang not found); arm64-v8a packaged')
        }
    }
}

if (System.getenv('PACKAGE_SIDECAR') == 'true') {
    preBuild.dependsOn 'packageSidecarBinaries'
}

tasks.register('printResolvedVersion') {
    doLast {
        println("VERSION_NAME=${resolvedVersionName}")
        println("VERSION_CODE=${resolvedVersionCode}")
    }
}
